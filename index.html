<!DOCTYPE html><html lang="pt-BR"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Thamiris Ferreira ❤️‍🔥</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9a8d4; background-image: radial-gradient(circle, #f472b6 1.5px, transparent 1.5px); background-size: 24px 24px;
      overflow: hidden;
    }
    .card {
      background: rgba(255,255,255,0.85);
      border-radius: 24px;
      padding: 40px 32px 32px;
      text-align: center;
      width: 320px;
      max-width: 90vw;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .photo-wrapper {
      width: 130px;
      height: 130px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #ec4899, #f43f5e, #ef4444);
    }
    .photo-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
    }
    .name {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text {
      font-size: 14px;
      font-weight: 600;
      color: #22c55e;
    }
    .response-time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: #0088cc;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      opacity: 1;
      transition: all 0.3s ease;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,136,204,0.3);
    }
    .cta-btn:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,136,204,0.4);
    }
    .cta-btn:not(:disabled):active {
      transform: translateY(0);
    }
    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .telegram-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
  </style>
  
</head>
<body>
  <div class="card">
    <div class="photo-wrapper">
      <div class="photo-inner">
        <img src="images/1192366c-7df8-4ccf-b064-b7ada273525e.png" alt="Thamiris Ferreira❤️‍🔥" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
      </div>
    </div>
    <div class="name">

      <span id="btn-spinner" class="btn-spinner"></span>
      <span id="btn-text">ACESSAR TELEGRAM</span>
    </button>
  </div>

    document.getElementById('cta-btn').addEventListener('click', function() {
